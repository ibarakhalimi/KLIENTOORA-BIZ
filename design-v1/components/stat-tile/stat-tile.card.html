<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--neutral-50); display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .tile { background: var(--surface); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 14px; }
  .chip { width: 50px; height: 50px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .lbl { font: var(--weight-medium) 12.5px var(--font-sans); color: var(--text-muted); }
  .val { font: var(--weight-extrabold) 24px var(--font-sans); color: var(--text-primary); letter-spacing: -0.4px; font-variant-numeric: tabular-nums; }
  .d { font: var(--weight-bold) 11.5px var(--font-sans); }
  svg { width: 24px; height: 24px; }
  .top { display: flex; align-items: baseline; gap: 7px; margin-top: 2px; white-space: nowrap; }
</style></head>
<body>
  <div class="tile"><div class="chip" style="background:var(--brand-subtle)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0M16 5.2a3.2 3.2 0 0 1 0 6M17.5 14.4a5.5 5.5 0 0 1 3 5"/></svg></div><div><div class="lbl">חברים פעילים</div><div class="top"><span class="val">1,236</span><span class="d" style="color:var(--success)">▲ 8%</span></div></div></div>
  <div class="tile"><div class="chip" style="background:var(--accent-amber-bg)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-amber)" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7v10M9.5 9.2c0-1 1-1.7 2.5-1.7s2.5.7 2.5 1.6c0 2.4-5 1.2-5 3.6 0 1 1 1.7 2.5 1.7s2.5-.7 2.5-1.6"/></svg></div><div><div class="lbl">נקודות החודש</div><div class="top"><span class="val">24,800</span><span class="d" style="color:var(--success)">▲ 5.6%</span></div></div></div>
  <div class="tile"><div class="chip" style="background:var(--accent-pink-bg)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-pink)" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="9" width="18" height="5" rx="1"/><path d="M5 14v7h14v-7M12 9v12M12 9S10.5 4 8 4a2 2 0 0 0 0 5zM12 9s1.5-5 4-5a2 2 0 0 1 0 5z"/></svg></div><div><div class="lbl">הטבות מומשו</div><div class="top"><span class="val">312</span><span class="d" style="color:var(--danger)">▼ 2%</span></div></div></div>
  <div class="tile"><div class="chip" style="background:var(--accent-teal-bg)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-teal)" stroke-width="1.8" stroke-linecap="round"><path d="M12 4l1.6 4.4L18 10l-4.4 1.6L12 16l-1.6-4.4L6 10l4.4-1.6z"/></svg></div><div><div class="lbl">חברים חדשים</div><div class="top"><span class="val">184</span><span class="d" style="color:var(--success)">▲ 22%</span></div></div></div>
</body></html>
