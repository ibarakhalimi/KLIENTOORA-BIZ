<!-- @dsCard group="Components" viewport="700x160" name="Avatar" subtitle="ראשי תיבות בגוון דטרמיניסטי · טבעת · מחסנית" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .h { font: var(--weight-semibold) 11px var(--font-sans); color: var(--text-faint); }
  .row { display: flex; align-items: center; }
  .av { border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font: var(--weight-semibold) var(--font-sans); flex-shrink: 0; }
</style></head>
<body>
  <div class="col"><div class="h">גדלים</div>
    <div class="row" style="gap:12px">
      <span class="av" style="width:34px;height:34px;font-size:13px;background:var(--purple-100);color:var(--purple-700)">דכ</span>
      <span class="av" style="width:44px;height:44px;font-size:17px;background:var(--pink-100);color:var(--pink-600)">מא</span>
      <span class="av" style="width:56px;height:56px;font-size:22px;background:var(--teal-100);color:var(--teal-600)">יל</span>
    </div>
  </div>
  <div class="col"><div class="h">עם טבעת (#1)</div>
    <div class="row" style="gap:12px">
      <span class="av" style="width:48px;height:48px;font-size:18px;background:var(--amber-100);color:var(--amber-600);box-shadow:0 0 0 2.5px var(--amber-500),0 0 0 5px var(--surface)">מא</span>
      <span class="av" style="width:48px;height:48px;font-size:18px;background:var(--green-100);color:var(--green-600);box-shadow:0 0 0 2.5px var(--success),0 0 0 5px var(--surface)">נפ</span>
    </div>
  </div>
  <div class="col"><div class="h">מחסנית +N</div>
    <div class="row">
      <span class="av" style="width:38px;height:38px;font-size:15px;background:var(--purple-100);color:var(--purple-700);box-shadow:0 0 0 2.5px var(--surface)">דכ</span>
      <span class="av" style="width:38px;height:38px;font-size:15px;background:var(--pink-100);color:var(--pink-600);margin-inline-start:-12px;box-shadow:0 0 0 2.5px var(--surface)">יל</span>
      <span class="av" style="width:38px;height:38px;font-size:15px;background:var(--teal-100);color:var(--teal-600);margin-inline-start:-12px;box-shadow:0 0 0 2.5px var(--surface)">מא</span>
      <span class="av" style="width:38px;height:38px;font-size:14px;background:var(--neutral-200);color:var(--text-secondary);margin-inline-start:-12px;box-shadow:0 0 0 2.5px var(--surface);font-weight:700">+124</span>
    </div>
  </div>
</body></html>
