<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Rubik — מ-Display ועד Caption" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .r:last-child { border: 0; }
  .spec { width: 150px; flex-shrink: 0; font: 11px var(--font-sans); color: var(--text-faint); }
  .spec b { color: var(--text-secondary); font-weight: var(--weight-semibold); }
  .sample { color: var(--text-primary); white-space: nowrap; }
</style></head>
<body>
  <div class="r"><div class="spec"><b>Display 2XL</b> · 66 / 800</div><div class="sample" style="font-size:46px;font-weight:800;letter-spacing:var(--tracking-tighter)">4,820</div></div>
  <div class="r"><div class="spec"><b>Display LG</b> · 36 / 800</div><div class="sample" style="font-size:34px;font-weight:800;letter-spacing:var(--tracking-tight)">מועדון נקודה</div></div>
  <div class="r"><div class="spec"><b>Heading 1</b> · 30 / 700</div><div class="sample" style="font-size:28px;font-weight:700;letter-spacing:var(--tracking-tight)">סקירה כללית</div></div>
  <div class="r"><div class="spec"><b>Heading 3</b> · 19 / 700</div><div class="sample" style="font-size:19px;font-weight:700">פעילות אחרונה</div></div>
  <div class="r"><div class="spec"><b>Body</b> · 14 / 500</div><div class="sample" style="font-size:14px;font-weight:500;color:var(--text-body)">הקהילה שלך גדלה ב-184 חברים החודש</div></div>
  <div class="r"><div class="spec"><b>Caption</b> · 12 / 500</div><div class="sample" style="font-size:12px;font-weight:500;color:var(--text-muted)">לפני 8 דקות · עודכן עכשיו</div></div>
  <div class="r"><div class="spec"><b>Overline</b> · 12 / 600</div><div class="sample t-overline" style="font-size:12px">סך חברי המועדון</div></div>
</body></html>
