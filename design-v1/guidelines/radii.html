<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="פינות נדיבות — לב הפן הידידותי" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface); display: flex; gap: 18px; align-items: flex-end; }
  .s { text-align: center; }
  .box { width: 76px; height: 64px; background: var(--brand-subtle); border: 1.5px solid var(--purple-200); }
  .v { font: var(--weight-bold) 11px var(--font-sans); color: var(--brand); margin-top: 8px; }
  .t { font: 10px var(--font-sans); color: var(--text-faint); }
</style></head>
<body>
  <div class="s"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="v">10</div><div class="t">radius-sm</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-md)"></div><div class="v">14</div><div class="t">radius-md</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="v">18</div><div class="t">radius-lg</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="v">22</div><div class="t">radius-xl</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="v">28</div><div class="t">radius-2xl</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="v">pill</div><div class="t">radius-pill</div></div>
</body></html>
