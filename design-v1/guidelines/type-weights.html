<!-- @dsCard group="Type" viewport="700x140" name="Weights & numerics" subtitle="משקלים בשימוש + ספרות טבלאיות" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--surface); }
  .ws { display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 16px; }
  .w { text-align: center; }
  .w .g { font-size: 30px; color: var(--text-primary); line-height: 1; }
  .w .l { font: 10.5px var(--font-sans); color: var(--text-faint); margin-top: 6px; }
  .nums { display: flex; gap: 28px; align-items: center; border-top: 1px solid var(--border); padding-top: 14px; }
  .nums .lab { font: var(--weight-semibold) 11px var(--font-sans); color: var(--text-muted); }
  .num { font-size: 22px; font-weight: 800; color: var(--text-primary); font-variant-numeric: var(--num-tabular); }
</style></head>
<body>
  <div class="ws">
    <div class="w"><div class="g" style="font-weight:400">Aא</div><div class="l">Regular 400</div></div>
    <div class="w"><div class="g" style="font-weight:500">Aא</div><div class="l">Medium 500</div></div>
    <div class="w"><div class="g" style="font-weight:600">Aא</div><div class="l">Semibold 600</div></div>
    <div class="w"><div class="g" style="font-weight:700">Aא</div><div class="l">Bold 700</div></div>
    <div class="w"><div class="g" style="font-weight:800">Aא</div><div class="l">Extrabold 800</div></div>
    <div class="w"><div class="g" style="font-weight:900">Aא</div><div class="l">Black 900</div></div>
  </div>
  <div class="nums">
    <span class="lab">ספרות טבלאיות · tabular-nums</span>
    <span class="num">1,236</span><span class="num">86,400</span><span class="num">₪142.5K</span><span class="num">+12.4%</span>
  </div>
</body></html>
