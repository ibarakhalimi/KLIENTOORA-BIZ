<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--surface); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 52px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .lbl { font: var(--weight-semibold) 11px var(--font-sans); color: var(--text-body); margin-top: 7px; }
  .hex { font: 10px var(--font-sans); color: var(--text-faint); margin-top: 1px; direction: ltr; }
</style></head>
<body>
  <div class="row" id="row"></div>
  <script>
    const steps = [0,50,100,200,300,400,500,600,700,900];
    document.getElementById('row').innerHTML = steps.map(s => {
      const v = getComputedStyle(document.documentElement).getPropertyValue('--neutral-'+s).trim();
      return `<div class="sw"><div class="chip" style="background:${v}"></div><div class="lbl">${s}</div><div class="hex">${v}</div></div>`;
    }).join('');
  </script>
</body></html>
